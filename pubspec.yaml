name: lojistik
description: "Flutter project for Mobile & Windows"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  firebase_core: ^4.2.1

  # Mobil Firebase paketleri
  firebase_auth: ^6.1.2
  cloud_firestore: ^6.1.0
  firebase_storage: ^13.0.4
  google_fonts: ^6.3.2
  url_launcher: ^6.3.2
  image_picker: ^1.2.1
  open_filex: ^4.7.0
  lottie: ^3.3.2
  flutter_downloader: ^1.11.0
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  file_selector: ^1.1.0
  file_picker: ^10.3.7
  win32: ^5.15.0

  # Windows için desktop SDK
#  firebase_core_desktop:

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
