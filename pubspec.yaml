name: lojistik
description: "Flutter project for Mobile & Windows"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  firebase_core: ^4.2.1

  # Mobil Firebase paketleri
  firebase_auth: ^6.1.2
  cloud_firestore: ^6.1.0
  firebase_storage: ^13.0.4
  google_fonts: ^6.3.2
  url_launcher: ^6.3.2
  image_picker: ^1.2.1
  open_filex: ^4.7.0
  lottie: ^3.3.2
  flutter_downloader: ^1.11.0
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  file_selector: ^1.0.3
  file_picker: ^10.3.7
  win32: ^5.15.0
  fl_chart: ^1.1.1
  pdf: ^3.11.3
  syncfusion_flutter_xlsio: ^31.2.16
  calendar_date_picker2: ^2.0.1
  cloud_functions: ^6.0.5
  http: ^1.6.0
  firebase_app_check: ^0.4.1+3
  firebase_messaging: ^16.1.0
  flutter_local_notifications: ^19.5.0
  shared_preferences: ^2.5.4
  firebase_database: ^12.1.1
  geolocator: ^14.0.2
  flutter_map: ^8.2.2
  latlong2: ^0.9.1

  # Windows için desktop SDK
#  firebase_core_desktop:

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/Roboto-Regular.ttf
    - assets/fonts/Roboto-Bold.ttf
    - assets/logo.png
    - assets/icons/