<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="description" content="Truck Management System">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="truck_management">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <title>Truck Management</title>
  <link rel="manifest" href="manifest.json">

  <!-- Flutter bootstrap -->
  <script src="flutter_bootstrap.js" defer></script>
</head>

<body>
<script>
  window.addEventListener('load', function () {
    _flutter.loader.load({
      serviceWorker: {
        serviceWorkerVersion: "{{flutter_service_worker_version}}",
      },
      onEntrypointLoaded: function (engineInitializer) {
        engineInitializer.initializeEngine().then(function (appRunner) {
          appRunner.runApp().then(() => {
            // 🔥 GOOGLE MAPS — FLUTTER SONRA
            const script = document.createElement('script');
            script.src =
              "https://maps.googleapis.com/maps/api/js?key=AIzaSyBW9ivbOndjriQ50cwHN6d3VUiWmQJ9VdE";
            script.async = true;
            document.body.appendChild(script);
          });
        });
      }
    });
  });
</script>
</body>
</html>
